# 1. Shared volume for logs
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: logs-volume
  namespace: monitoring
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 1Gi
---
# 2. Promtail to ship logs to Loki with JSON parsing
apiVersion: apps/v1
kind: Deployment
metadata:
  name: promtail
  namespace: monitoring
spec:
  replicas: 1
  selector:
    matchLabels:
      app: promtail
  template:
    metadata:
      labels:
        app: promtail
    spec:
      containers:
      - name: promtail
        image: grafana/promtail:3.4.3
        args:
        - -config.file=/etc/promtail/config.yaml
        volumeMounts:
        - name: log-storage
          mountPath: /var/log
        - name: promtail-config
          mountPath: /etc/promtail
      volumes:
      - name: log-storage
        persistentVolumeClaim:
          claimName: logs-volume
      - name: promtail-config
        configMap:
          name: promtail-config
---
# 3. Promtail ConfigMap with JSON parsing stage
apiVersion: v1
kind: ConfigMap
metadata:
  name: promtail-config
  namespace: monitoring
data:
  config.yaml: |
    server:
      http_listen_port: 9080
      grpc_listen_port: 0
      log_level: "info"

    positions:
      filename: /tmp/positions.yaml

    clients:
      - url: http://loki-gateway.monitoring.svc.cluster.local/loki/api/v1/push
        tenant_id: fake  # This adds the X-Scope-OrgID header

    scrape_configs:
      - job_name: generated-logs
        static_configs:
          - targets:
              - localhost
            labels:
              job: generated-logs
              __path__: /var/log/generated-logs.txt
        pipeline_stages:
          - json:
              expressions:
                http_method: 'method'
                http_status: "status"
          - labels:
              http_method:
              http_status:
---
